<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Driver App — EstimatorSaaS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --brand:     #2d6a4f;
    --brand-dim: rgba(45,106,79,.12);
    --green:     #16a34a;
    --amber:     #d97706;
    --red:       #dc2626;
    --ink:       #1a1814;
    --ink-2:     #4a4540;
    --ink-3:     #9e9689;
    --surface:   #f8f5f0;
    --border:    #e8e2d9;
    --white:     #ffffff;
    --radius:    14px;
    --mono:      'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--surface); color: var(--ink); min-height: 100dvh }

  .app-header {
    background: var(--brand);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .app-header h1 { font-size: 17px; font-weight: 600 }
  .app-header .sub { font-size: 12px; opacity: .75; margin-top: 2px }
  .date-badge { background: rgba(255,255,255,.2); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600 }

  .summary-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 20px;
  }
  .summary-item { text-align: center }
  .summary-item .val { font-size: 20px; font-weight: 700; color: var(--brand) }
  .summary-item .lbl { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em }

  .stops-list { padding: 16px; display: flex; flex-direction: column; gap: 12px }

  .stop-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    border: 1px solid var(--border);
    transition: opacity .2s;
  }
  .stop-card.completed { opacity: .55 }

  .stop-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .stop-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--brand-dim);
    color: var(--brand);
    font-weight: 700;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .stop-num.done { background: var(--green); color: #fff }
  .stop-title { font-weight: 600; font-size: 14px }
  .stop-type  { font-size: 11px; color: var(--ink-3); margin-top: 2px }
  .stop-status { margin-left: auto; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px }
  .status-pending   { background: #fef3c7; color: #92400e }
  .status-completed { background: #dcfce7; color: #166534 }
  .status-en_route  { background: #dbeafe; color: #1e40af }

  .stop-body { padding: 14px 16px }
  .stop-address { font-size: 13px; color: var(--ink-2); margin-bottom: 10px; display: flex; align-items: flex-start; gap: 6px }
  .stop-address svg { flex-shrink: 0; margin-top: 2px }

  .stop-meta { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap }
  .meta-pill { font-size: 11px; background: var(--surface); padding: 3px 8px; border-radius: 20px; color: var(--ink-2) }

  .stop-actions { display: flex; gap: 8px; flex-wrap: wrap }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; transition: all .15s }
  .btn-primary  { background: var(--brand); color: #fff }
  .btn-primary:active { background: #1e4d37 }
  .btn-outline  { background: transparent; color: var(--brand); border: 1.5px solid var(--brand) }
  .btn-green    { background: var(--green); color: #fff }
  .btn-sm       { padding: 7px 12px; font-size: 12px }
  .btn-full     { width: 100% }

  .notes-area {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
    color: var(--ink);
    background: var(--white);
    margin-bottom: 8px;
  }
  .notes-area:focus { outline: none; border-color: var(--brand) }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-3);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform .3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0) }

  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
  }
  .login-card {
    background: var(--white);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .login-logo { font-size: 22px; font-weight: 700; color: var(--brand); margin-bottom: 6px }
  .login-sub  { font-size: 14px; color: var(--ink-3); margin-bottom: 24px }
  .form-label { font-size: 12px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 6px }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; color: var(--ink); background: var(--white); margin-bottom: 16px }
  .form-input:focus { outline: none; border-color: var(--brand) }

  .progress-bar-wrap { background: var(--border); border-radius: 4px; height: 4px; margin: 12px 20px }
  .progress-bar { background: var(--brand); height: 4px; border-radius: 4px; transition: width .4s }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">EstimatorSaaS</div>
    <div class="login-sub">Driver Portal — enter your name to view today's route</div>
    <label class="form-label">Your Name</label>
    <input class="form-input" id="login-name" placeholder="e.g. John Smith" autocomplete="name">
    <label class="form-label">Today's Date</label>
    <input class="form-input" id="login-date" type="date">
    <button class="btn btn-primary btn-full" onclick="loginDriver()" style="padding:14px;font-size:15px">View My Route →</button>
  </div>
</div>

<div id="app-screen" style="display:none">
  <div class="app-header">
    <div>
      <div class="app-header h1" id="driver-name-header">Driver App</div>
      <div class="app-header sub" id="driver-route-sub">Loading route…</div>
    </div>
    <div class="date-badge" id="date-badge">Today</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="summary-bar">
    <div class="summary-item"><div class="val" id="stops-total">—</div><div class="lbl">Total</div></div>
    <div class="summary-item"><div class="val" id="stops-done" style="color:var(--green)">—</div><div class="lbl">Done</div></div>
    <div class="summary-item"><div class="val" id="stops-left" style="color:var(--amber)">—</div><div class="lbl">Left</div></div>
  </div>

  <div class="stops-list" id="stops-list">
    <div class="empty-state"><div class="icon">📋</div><h3>Loading stops…</h3></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://shjyorirrhdqwjfxrdsa.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoanlvcmlycmhkcXdqZnhyZHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEzNzAzNjcsImV4cCI6MjA1Njk0NjM2N30.6-PXu5bRqRZHxsyoArKHRpPFkGHgHJi5cFEMHGVODFI'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let driverData = null
let routeStops = []

// Parse URL params
const params   = new URLSearchParams(location.search)
const urlDate  = params.get('route_date')
const urlDriver = params.get('driver_id')

// Pre-fill date
document.getElementById('login-date').value = urlDate || new Date().toISOString().slice(0,10)

async function loginDriver() {
  const name = document.getElementById('login-name').value.trim()
  const date = document.getElementById('login-date').value
  if (!name || !date) { showToast('Enter your name and date'); return }

  // Find driver by name (case-insensitive)
  let query = sb.from('drivers').select('*').ilike('full_name', `%${name}%`).eq('status','active')
  if (urlDriver) query = sb.from('drivers').select('*').eq('id', urlDriver)
  const { data: drivers } = await query
  if (!drivers?.length) { showToast('Driver not found — check your name'); return }

  driverData = drivers[0]
  document.getElementById('login-screen').style.display  = 'none'
  document.getElementById('app-screen').style.display    = 'block'
  document.getElementById('driver-name-header').textContent = driverData.full_name
  document.getElementById('date-badge').textContent = new Date(date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})

  await loadStops(date)
}

async function loadStops(date) {
  // Try to get optimized route stops first
  const { data: route } = await sb.from('routes')
    .select('id')
    .eq('driver_id', driverData.id)
    .eq('route_date', date)
    .order('created_at', { ascending: false })
    .limit(1)
    .single()

  let jobs = []

  if (route) {
    document.getElementById('driver-route-sub').textContent = 'Optimized route • ' + date
    const { data: stops } = await sb.from('route_stops')
      .select('*, jobs(*)')
      .eq('route_id', route.id)
      .order('stop_order')
    jobs = stops?.map(s => ({ ...s.jobs, stop_id: s.id, stop_status: s.status, stop_order: s.stop_order })) || []
  } else {
    // Fallback: just show assigned jobs for this driver/date
    document.getElementById('driver-route-sub').textContent = 'Assigned jobs • ' + date
    const { data: assigned } = await sb.from('jobs')
      .select('*')
      .eq('driver_id', driverData.id)
      .eq('scheduled_date', date)
      .neq('status','cancelled')
      .order('scheduled_time')
    jobs = assigned || []
  }

  routeStops = jobs
  renderStops()
}

function renderStops() {
  const list = document.getElementById('stops-list')
  const total     = routeStops.length
  const completed = routeStops.filter(j => (j.stop_status || j.status) === 'completed').length
  const left      = total - completed
  const pct       = total ? Math.round(completed / total * 100) : 0

  document.getElementById('stops-total').textContent = total
  document.getElementById('stops-done').textContent  = completed
  document.getElementById('stops-left').textContent  = left
  document.getElementById('progress-bar').style.width = pct + '%'

  if (!routeStops.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">✅</div><h3>No stops assigned</h3><p style="font-size:13px;margin-top:6px">Contact your dispatcher if this seems wrong</p></div>`
    return
  }

  const priorityLabel = { normal: '', urgent: '🔴 Urgent', after_hours: '🌙 After Hours', weekend: '📅 Weekend' }

  list.innerHTML = routeStops.map((j, idx) => {
    const isDone  = (j.stop_status || j.status) === 'completed'
    const isRoute = !!j.stop_id
    return `<div class="stop-card ${isDone ? 'completed' : ''}" id="stop-${j.id}">
      <div class="stop-header">
        <div class="stop-num ${isDone ? 'done' : ''}">${isDone ? '✓' : idx+1}</div>
        <div style="flex:1">
          <div class="stop-title">${j.title}</div>
          <div class="stop-type">${j.service_type || 'service'} ${priorityLabel[j.priority] ? '· ' + priorityLabel[j.priority] : ''}</div>
        </div>
        <span class="stop-status status-${isDone ? 'completed' : (j.stop_status || j.status)}">${isDone ? 'Done' : (j.stop_status || j.status)}</span>
      </div>
      <div class="stop-body">
        <div class="stop-address">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${j.address || 'No address provided'}
        </div>
        <div class="stop-meta">
          ${j.scheduled_time ? `<span class="meta-pill">🕐 ${j.scheduled_time.slice(0,5)}</span>` : ''}
          ${j.duration_mins  ? `<span class="meta-pill">⏱ ${j.duration_mins}min</span>` : ''}
          ${j.price > 0      ? `<span class="meta-pill">💰 $${j.price}</span>` : ''}
        </div>
        ${j.notes ? `<div style="font-size:12px;color:var(--ink-3);background:var(--surface);padding:8px 10px;border-radius:8px;margin-bottom:10px">${j.notes}</div>` : ''}
        ${!isDone ? `
        <textarea class="notes-area" id="notes-${j.id}" placeholder="Add completion notes…"></textarea>
        <div class="stop-actions">
          ${j.address ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(j.address)}" target="_blank" class="btn btn-outline btn-sm">🗺 Navigate</a>` : ''}
          <button class="btn btn-green btn-sm" onclick="completeStop('${j.id}','${isRoute ? j.stop_id : ''}')">✓ Mark Complete</button>
        </div>` : `<div style="color:var(--green);font-size:13px;font-weight:500">✓ Completed</div>`}
      </div>
    </div>`
  }).join('')
}

async function completeStop(jobId, stopId) {
  const notes = document.getElementById('notes-' + jobId)?.value?.trim()

  // Update job status
  await sb.from('jobs').update({ status: 'completed' }).eq('id', jobId)

  // Update route stop if exists
  if (stopId) {
    await sb.from('route_stops').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', stopId)
  }

  // Save notes if any
  if (notes && driverData) {
    await sb.from('job_notes').insert({ job_id: jobId, driver_id: driverData.id, note: notes })
  }

  // Update local state
  const idx = routeStops.findIndex(j => j.id === jobId)
  if (idx !== -1) {
    routeStops[idx].stop_status = 'completed'
    routeStops[idx].status      = 'completed'
  }

  showToast('✓ Stop completed!')
  renderStops()
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

// If driver_id in URL, auto-load
if (urlDriver) {
  document.getElementById('login-name').value = 'auto'
}
</script>
</body>
</html>
